version: "3.9"
services:
  db:
    image: postgres:16-alpine
    container_name: db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  notes:
    build:
      context: .
    container_name: app
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1   
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data: